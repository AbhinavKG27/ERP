spring:
  application:
    name: apex-erp
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: apex_erp
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    schemas: apex_erp
    locations: classpath:db/migration
    validate-on-migrate: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@apex.edu}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

app:
  name: Apex Institute of Technology
  base-url: ${APP_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:apex-erp-super-secret-key-must-be-at-least-256-bits-long-change-in-prod}
    access-token-expiry-ms: 86400000  
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  pagination:
    default-page-size: 20
    max-page-size: 100
  attendance:
    eligible-threshold: 85.0
    approval-threshold: 75.0
    fine-threshold: 65.0
    fine-amount-per-subject: 500.00
  cgpa:
    internal-weight: 0.40
    external-weight: 0.60
  promotion:
    max-backlogs-before-detention: 4
  library:
    max-books-per-user: 3
    loan-period-days: 14
    fine-per-day: 2.00
  notification:
    push-enabled: ${PUSH_ENABLED:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/apex_erp
    username: ${DB_USERNAME:apex_user}
    password: ${DB_PASSWORD:apex_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    show-sql: true

logging:
  level:
    com.apex.erp: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    com.apex.erp: INFO
    org.springframework.security: WARN